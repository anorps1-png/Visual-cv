name: CI

on:
  push:
    branches: [master]
  pull_request:

# Annule les runs obsolètes quand on pousse plusieurs fois d'affilée.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npx eslint "src/lib/**/*.ts" "src/app/api/**/*.ts"

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Le build ne doit pas dépendre de vrais secrets : ces valeurs
          # factices suffisent à satisfaire l'initialisation des clients.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
          PAYMENT_PROVIDER: mock
          APP_URL: http://localhost:3000
